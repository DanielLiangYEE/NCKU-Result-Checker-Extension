<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <title>115 碩士班考試 查榜助手</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <header>
    <h1><img src="icons/icon128.png" class="header-icon" alt="Logo"> 115 碩士班考試 查榜助手</h1>
    <div class="header-actions">
      <button id="announcementBtn" class="announcement-toggle" title="查看公告">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </button>
      <span class="version">v2.2</span>
    </div>
  </header>

  <!-- Announcement Banner (由 JS 動態渲染內容) -->
  <div id="announcementBanner"></div>

  <section class="uni-selector">
    <div class="custom-select" id="uniSelector">
      <div class="select-trigger" tabindex="0">
        <span id="currentUniName">台灣大學 (NTU)</span>
        <span class="arrow"></span>
      </div>
      <div class="select-options" id="uniOptions">
        <div class="option" data-value="ntu">台灣大學 (NTU)</div>
        <div class="option" data-value="nccu">政治大學 (NCCU)</div>
        <div class="option" data-value="ncku">成功大學 (NCKU)</div>
        <div class="option" data-value="ncu">中央大學 (NCU)</div>
        <div class="option" data-value="nsysu">中山大學 (NSYSU)</div>
        <div class="option" data-value="ccu">中正大學 (CCU)</div>
      </div>
    </div>
  </section>

  <section class="search-section">
    <div class="search-container">
      <input type="text" id="deptSearch" placeholder="搜尋系所名稱或代碼...">
      <div id="searchResults" class="results-dropdown"></div>
    </div>
    <button id="addBtn">新增</button>
  </section>

  <section class="saved-section">
    <div id="listContainer">
      <!-- List items injected by JS -->
    </div>
  </section>

  <script type="module" src="popup.js"></script>
  <footer>
    <span class="copyright">© 2026 DYEE. All Rights Reserved.</span>
  </footer>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite">
    <div class="crown-loading-wrapper">
      <div class="crown-progress-container">
        <img src="icons/icon128.png" class="crown-icon base" alt="Crown">
        <img src="icons/icon128.png" class="crown-icon active" alt="Crown">
      </div>
      <div class="loading-text">正在查詢...</div>
    </div>
  </div>
</body>

</html>
